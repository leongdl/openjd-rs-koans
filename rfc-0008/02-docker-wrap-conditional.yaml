# RFC 0008 / EXPR — Docker wrap environment with conditionals
#
# The golden rule inside a wrap hook: never interpolate Task.Command or
# Task.Args into a raw shell string. Use repr_sh() so each argument becomes
# exactly one argv entry after the shell parses the line.
#
# This template demonstrates:
#   - Conditional flags on the wrapper itself (--gpus all, --user root)
#   - Safe env-var forwarding via flatten + list comprehension + repr_sh
#   - Two styles of conditional token emission:
#       a) '--flag' if cond else ''        — scalar swap inside a shell template
#       b) repr_sh([...] if cond else [])  — list-level conditional with safe quoting

specificationVersion: "environment-2023-09"
extensions:
  - WRAP_ACTIONS
  - EXPR

parameterDefinitions:
  - name: ContainerImage
    type: STRING
    default: "ubuntu:latest"
  - name: EnableGpu
    type: STRING
    allowedValues: ["true", "false"]
    default: "false"

environment:
  name: Docker
  script:
    actions:
      onEnter:
        command: bash
        args: ["{{Env.File.Enter}}"]

      onWrapEnter:
        command: bash
        args: ["{{Env.File.WrapEnter}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onWrapTaskRun:
        command: bash
        args: ["{{Env.File.WrapTaskRun}}"]
        timeout: "{{Task.Timeout}}"

      onWrapExit:
        command: bash
        args: ["{{Env.File.WrapExit}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onExit:
        command: bash
        args: ["{{Env.File.Exit}}"]

    embeddedFiles:
      - name: Enter
        filename: docker-env-enter.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          docker image pull {{ repr_sh(Param.ContainerImage) }}

          DOCKER_CONTAINER_ID=$(docker container run --rm \
              --pull never \
              --detach \
              --network host \
              {{ '--gpus all' if Param.EnableGpu == 'true' else '' }} \
              --mount 'type=bind,src={{Session.WorkingDirectory}},dst={{Session.WorkingDirectory}}' \
              {{ repr_sh(Param.ContainerImage) }} \
              bash -c 'sleep infinity')

          echo "openjd_env: DOCKER_CONTAINER_ID=$DOCKER_CONTAINER_ID"

      - name: WrapEnter
        filename: docker-wrap-enter.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          echo "[Docker] onEnter for env {{ repr_sh(Env.Wrapped.Name) }}"

          # Use --user root for Setup/Install environments, default user otherwise.
          # repr_sh on a list makes this a list-level conditional: either
          # two tokens (--user root) or zero tokens.
          docker container exec \
              {{ repr_sh(
                   ['--user', 'root']
                   if re_match(Env.Wrapped.Name or '', r'.*(Setup|Install).*')
                   else []
                 ) }} \
              {{ repr_sh(flatten([['-e', e] for e in Env.Wrapped.Environment])) }} \
              "$DOCKER_CONTAINER_ID" \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

      - name: WrapTaskRun
        filename: docker-wrap-task-run.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          # Every interpolation is passed through repr_sh() so shell
          # metacharacters in Task.Command, Task.Args, or Task.Environment
          # become literal argv entries, not shell instructions.
          docker container exec \
              {{ '--gpus all' if Param.EnableGpu == 'true' else '' }} \
              "$DOCKER_CONTAINER_ID" \
              {{ repr_sh(flatten([['-e', e] for e in Task.Environment])) }} \
              {{ repr_sh(Task.Command) }} \
              {{ repr_sh(Task.Args) }}

      - name: WrapExit
        filename: docker-wrap-exit.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          echo "[Docker] onExit for env {{ repr_sh(Env.Wrapped.Name) }}"
          docker container exec \
              "$DOCKER_CONTAINER_ID" \
              {{ repr_sh(flatten([['-e', e] for e in Env.Wrapped.Environment])) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

      - name: Exit
        filename: docker-env-exit.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          docker container stop --timeout 30 "$DOCKER_CONTAINER_ID"
