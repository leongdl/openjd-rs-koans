# RFC 0008 / EXPR — Profiling and instrumentation wrap
#
# Wrap every action with a profiling/tracing tool — without modifying the job
# template or any inner step environments. This is the canonical example of
# what the RFC calls "instrumentation over the full session": profiling ONLY
# task runs misses the setup phases that are often where perf problems hide.
#
# Three profiling modes shown (swap between them by changing `mode` param):
#   - perf    → Linux perf stat for cycle counts, cache misses, IPC
#   - strace  → system call trace
#   - time    → simple wall + user + sys time (always safe, low overhead)
#
# Per-action output files named by action-type + inner env name so the
# reports don't overwrite each other.

specificationVersion: "environment-2023-09"
extensions:
  - WRAP_ACTIONS
  - EXPR

parameterDefinitions:
  - name: Mode
    type: STRING
    allowedValues: ["perf", "strace", "time"]
    default: "time"
  - name: OutputDir
    type: PATH
    objectType: DIRECTORY
    dataFlow: OUT

environment:
  name: ProfileWrap
  description: >
    Adds a profiling prefix to every wrapped action. Reports go to
    <OutputDir>/<action-type>-<env-or-task-name>.<profiler-ext>.
  script:
    let:
      # Prefix tokens for each mode. Empty list = no wrapper.
      # Using lists means repr_sh expansion always produces valid tokens.
      - perf_prefix   = ['perf', 'stat', '-d', '-d', '-d']
      - strace_prefix = ['strace', '-f', '-c']
      - time_prefix   = ['/usr/bin/time', '-v']

      # Select the prefix once per session based on the mode param.
      # EXPR supports chained ternaries for if/elif/else.
      - profile_prefix = (
          perf_prefix    if Param.Mode == 'perf'   else
          strace_prefix  if Param.Mode == 'strace' else
          time_prefix
        )

      # Extension for the per-action output file.
      - report_ext = (
          '.perf.txt'    if Param.Mode == 'perf'   else
          '.strace.txt'  if Param.Mode == 'strace' else
          '.time.txt'
        )

    actions:
      onEnter:
        command: bash
        args: ["-c", "mkdir -p {{ repr_sh(string(Param.OutputDir)) }}"]

      onWrapEnter:
        command: bash
        args: ["{{Env.File.WrapEnter}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onWrapTaskRun:
        command: bash
        args: ["{{Env.File.WrapTaskRun}}"]
        timeout: "{{Task.Timeout}}"

      onWrapExit:
        command: bash
        args: ["{{Env.File.WrapExit}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onExit:
        command: bash
        args: ["-c", "echo 'profile reports written to {{ repr_sh(string(Param.OutputDir)) }}'"]

    embeddedFiles:
      - name: WrapEnter
        filename: profile-enter.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          REPORT={{ repr_sh(string(Param.OutputDir / ('enter-' + (Env.Wrapped.Name or 'anon') + report_ext))) }}

          # Redirect profiler stderr to the report file. Inner stdout/stderr
          # are preserved for openjd_env propagation.
          exec 2> >(tee -a "$REPORT" >&2)

          {{ repr_sh(profile_prefix) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

      - name: WrapTaskRun
        filename: profile-task.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          REPORT={{ repr_sh(string(Param.OutputDir / ('task' + report_ext))) }}
          exec 2> >(tee -a "$REPORT" >&2)

          {{ repr_sh(profile_prefix) }} \
              {{ repr_sh(Task.Command) }} \
              {{ repr_sh(Task.Args) }}

      - name: WrapExit
        filename: profile-exit.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          REPORT={{ repr_sh(string(Param.OutputDir / ('exit-' + (Env.Wrapped.Name or 'anon') + report_ext))) }}
          exec 2> >(tee -a "$REPORT" >&2)

          {{ repr_sh(profile_prefix) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}
