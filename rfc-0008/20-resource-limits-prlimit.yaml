# RFC 0008 / EXPR — Resource limits via prlimit / cgroups
#
# Enforce per-action resource limits (memory, CPU time, file descriptors,
# process count) using Linux's prlimit. Different limit sets for different
# action types, because:
#
#   - Env setup is often heavy (compilers, installers, big archives)
#   - Task runs have well-known resource profiles
#   - Env teardown should be fast and lightweight
#
# Demonstrates:
#   - Per-action-type limit selection via ternaries on Env.Wrapped.Name
#   - Computing limits from job parameters (e.g., MemoryGB * 1024)
#   - Mapping a dict-like structure to flat prlimit flags via list comp
#
# No containers; just kernel-level limits on the worker.

specificationVersion: "environment-2023-09"
extensions:
  - WRAP_ACTIONS
  - EXPR

parameterDefinitions:
  - name: MemoryMB
    type: INT
    default: 8192
    description: "Max resident memory per wrapped action, in megabytes."
  - name: CpuSeconds
    type: INT
    default: 3600
    description: "Max CPU time per wrapped action, in seconds."
  - name: MaxProcesses
    type: INT
    default: 512
  - name: MaxFds
    type: INT
    default: 4096

environment:
  name: ResourceLimitsWrap
  description: >
    Apply prlimit-enforced resource limits to every wrapped action.
    Env setup gets 2x headroom on memory and process count; tasks get the
    nominal values; teardown gets half.
  script:
    let:
      # Preflight: catch nonsensical configs at eval time.
      - _check_mem = Param.MemoryMB > 0 or fail('MemoryMB must be positive')
      - _check_cpu = Param.CpuSeconds > 0 or fail('CpuSeconds must be positive')

      # Convert MB → bytes for prlimit --as (address space, in bytes).
      - mem_bytes_nominal = Param.MemoryMB * 1024 * 1024

      # Limit presets — three profiles keyed by action phase.
      - limits_enter = [
          '--as=' + string(mem_bytes_nominal * 2),
          '--cpu=' + string(Param.CpuSeconds),
          '--nproc=' + string(Param.MaxProcesses * 2),
          '--nofile=' + string(Param.MaxFds)
        ]

      - limits_task = [
          '--as=' + string(mem_bytes_nominal),
          '--cpu=' + string(Param.CpuSeconds),
          '--nproc=' + string(Param.MaxProcesses),
          '--nofile=' + string(Param.MaxFds)
        ]

      - limits_exit = [
          '--as=' + string(mem_bytes_nominal / 2),
          '--cpu=' + string(Param.CpuSeconds / 4),
          '--nproc=' + string(Param.MaxProcesses / 2),
          '--nofile=' + string(Param.MaxFds)
        ]

    actions:
      onEnter:
        command: bash
        args: ["-c", "echo 'resource-limit wrap ready'"]

      onWrapEnter:
        command: bash
        args: ["{{Env.File.WrapEnter}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onWrapTaskRun:
        command: bash
        args: ["{{Env.File.WrapTaskRun}}"]
        timeout: "{{Task.Timeout}}"

      onWrapExit:
        command: bash
        args: ["{{Env.File.WrapExit}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onExit:
        command: bash
        args: ["-c", "echo 'resource-limit wrap done'"]

    embeddedFiles:
      - name: WrapEnter
        filename: limit-enter.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          # prlimit --<key>=<value> ... -- command args
          # The whole flag list comes from `let` so each flag is a clean argv.
          exec prlimit {{ repr_sh(limits_enter) }} -- \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

      - name: WrapTaskRun
        filename: limit-task.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          exec prlimit {{ repr_sh(limits_task) }} -- \
              {{ repr_sh(Task.Command) }} \
              {{ repr_sh(Task.Args) }}

      - name: WrapExit
        filename: limit-exit.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          exec prlimit {{ repr_sh(limits_exit) }} -- \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

# For fine-grained resource control on newer systems, replace `prlimit`
# with `systemd-run --user --scope -p MemoryMax=... -p CPUQuota=...`:
#
#     exec systemd-run --user --scope \
#         -p MemoryMax={{ Param.MemoryMB }}M \
#         -p CPUQuota={{ Param.CpuSeconds * 100 / 60 }}% \
#         -- {{ repr_sh(Task.Command) }} {{ repr_sh(Task.Args) }}
#
# cgroup v2 limits are more precise than prlimit for memory (prlimit's --as
# measures virtual address space, not RSS).
