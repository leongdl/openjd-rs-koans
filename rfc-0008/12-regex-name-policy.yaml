# RFC 0008 / EXPR — Regex-driven policy on Env.Wrapped.Name
#
# Wrap hooks receive the inner environment's `name`. Since it's just a string,
# re_match can drive policy decisions without hard-coding lists of env names.
# This keeps the wrap env open to new inner envs that match your convention.
#
# Patterns shown:
#   1. --user root for Setup/Install envs (regex on name)
#   2. `perf stat --` prefix for Profile* envs
#   3. Default behavior when no pattern matches
#
# Notice the `Env.Wrapped.Name or ''` idiom — EXPR's null-coalescing `or`
# returns the left side unless it's null/false. re_match(null, ...) would be
# a type error, so we default to the empty string.

specificationVersion: "environment-2023-09"
extensions:
  - WRAP_ACTIONS
  - EXPR

environment:
  name: NamePolicyDocker
  description: >
    Applies per-inner-env policy based on env name patterns.
      Setup* / Install*  → run as root
      Profile*           → wrap with `perf stat`
      anything else      → run as default user, no wrapper
  script:
    let:
      # Expose the regexes as let-bindings so they're documented once and
      # easy to update.
      - root_pattern    = r'^(Setup|Install).*'
      - profile_pattern = r'^Profile.*'

    actions:
      onEnter:
        command: bash
        args: ["-c", "echo 'container start (omitted)'"]

      onWrapEnter:
        command: bash
        args: ["{{Env.File.WrapEnter}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onWrapTaskRun:
        command: bash
        args: ["{{Env.File.WrapTaskRun}}"]
        timeout: "{{Task.Timeout}}"

      onWrapExit:
        command: bash
        args: ["{{Env.File.WrapExit}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onExit:
        command: bash
        args: ["-c", "echo 'container stop (omitted)'"]

    embeddedFiles:
      - name: WrapEnter
        filename: wrap-enter-policy.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          # ── Pattern 1: --user root when the inner env is Setup/Install ──
          # repr_sh on a list gives us a list-level conditional: the ternary
          # returns either ['--user', 'root'] or [] and repr_sh quotes both.
          #
          # ── Pattern 2: perf stat wrapper when the env is a Profile* ──
          # Prefix the command with `perf stat --` so every inner action is
          # measured. Drop into [] for non-profile envs so nothing changes.
          docker container exec \
              {{ repr_sh(
                   ['--user', 'root']
                   if re_match(Env.Wrapped.Name or '', root_pattern)
                   else []
                 ) }} \
              "$DOCKER_CONTAINER_ID" \
              {{ repr_sh(flatten([['-e', e] for e in Env.Wrapped.Environment])) }} \
              {{ repr_sh(
                   ['perf', 'stat', '--']
                   if re_match(Env.Wrapped.Name or '', profile_pattern)
                   else []
                 ) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

      - name: WrapTaskRun
        filename: wrap-task-policy.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          # Task runs are not tied to an inner env name, so no policy here —
          # just forward safely.
          docker container exec \
              "$DOCKER_CONTAINER_ID" \
              {{ repr_sh(flatten([['-e', e] for e in Task.Environment])) }} \
              {{ repr_sh(Task.Command) }} \
              {{ repr_sh(Task.Args) }}

      - name: WrapExit
        filename: wrap-exit-policy.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          # Exit mirrors enter so symmetrically-named setup/teardown pairs
          # both get the same treatment.
          docker container exec \
              {{ repr_sh(
                   ['--user', 'root']
                   if re_match(Env.Wrapped.Name or '', root_pattern)
                   else []
                 ) }} \
              "$DOCKER_CONTAINER_ID" \
              {{ repr_sh(flatten([['-e', e] for e in Env.Wrapped.Environment])) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}
