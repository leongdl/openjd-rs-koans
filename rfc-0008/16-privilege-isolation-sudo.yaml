# RFC 0008 / EXPR — Privilege isolation with sudo/unshare
#
# Run every wrapped action as a less-privileged user, or inside a namespace
# with reduced capabilities. No containers involved — just standard Linux
# privilege-separation tools.
#
# Why: lots of studios want to run artist-submitted jobs as a locked-down
# `renderfarm` user rather than the scheduler's service account, without
# the overhead or complexity of containers.
#
# Two modes:
#   1. sudo -u RENDERUSER  → drop to an unprivileged user
#   2. unshare             → new mount/network/IPC namespace
#
# Key trick: sudo -u can drop your shell quoting context because it re-exec's
# into a new process. Passing Command + Args as separate argv elements
# (via repr_sh on a list) keeps each arg atomic across the sudo boundary.

specificationVersion: "environment-2023-09"
extensions:
  - WRAP_ACTIONS
  - EXPR

parameterDefinitions:
  - name: TargetUser
    type: STRING
    default: "renderfarm"
    description: "Unprivileged user to execute wrapped commands as."
  - name: IsolateNetwork
    type: STRING
    allowedValues: ["true", "false"]
    default: "false"
    description: "Use unshare to give the wrapped process an empty network namespace."

environment:
  name: PrivilegeIsolation
  script:
    let:
      # Build the unshare flag list based on param choices. Each flag goes
      # in independently so we can toggle features per-param.
      - unshare_flags = (
          ['unshare', '--mount', '--ipc', '--pid', '--fork']
          + (['--net'] if Param.IsolateNetwork == 'true' else [])
        )

      - sudo_prefix = ['sudo', '-n', '-u', Param.TargetUser, '--']

    actions:
      onEnter:
        command: bash
        args: ["-c", "id"]    # verify the scheduler user context

      onWrapTaskRun:
        command: bash
        args: ["{{Env.File.WrapTaskRun}}"]
        timeout: "{{Task.Timeout}}"

      onWrapEnter:
        command: bash
        args: ["{{Env.File.WrapEnter}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onWrapExit:
        command: bash
        args: ["{{Env.File.WrapExit}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onExit:
        command: bash
        args: ["-c", "echo 'privilege-isolation session ending'"]

    embeddedFiles:
      - name: WrapTaskRun
        filename: drop-and-isolate.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          # Chain: unshare (new namespaces) → sudo -u (drop privileges) → cmd
          # Every piece comes from a list so repr_sh keeps each arg atomic
          # across two process-exec boundaries.
          exec \
              {{ repr_sh(unshare_flags) }} \
              {{ repr_sh(sudo_prefix) }} \
              {{ repr_sh(Task.Command) }} \
              {{ repr_sh(Task.Args) }}

      - name: WrapEnter
        filename: env-enter.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          # Env setup runs under the same drop + namespace policy as tasks.
          exec \
              {{ repr_sh(unshare_flags) }} \
              {{ repr_sh(sudo_prefix) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

      - name: WrapExit
        filename: env-exit.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          exec \
              {{ repr_sh(unshare_flags) }} \
              {{ repr_sh(sudo_prefix) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

# Sudoers requirement: the scheduler's service user must be allowed to sudo
# to TargetUser without a password. Example /etc/sudoers.d/openjd-wrap:
#
#   openjd-worker ALL=(renderfarm) NOPASSWD: ALL
#
# Only the minimum required binaries should be allowed in production; a
# narrower `NOPASSWD: /usr/bin/unshare` restricts the attack surface.
