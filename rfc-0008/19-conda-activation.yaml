# RFC 0008 / EXPR — Conda activation wrap
#
# Run every wrapped action inside an activated conda environment WITHOUT the
# inner step environments needing to know about conda. The wrapper activates
# the env once (in onEnter), then each wrap hook invokes conda run so the
# child inherits the activated environment.
#
# Why this matters:
#   - Conda activation mutates PATH, CONDA_PREFIX, PYTHONPATH, etc.
#   - Existing Conda queue environments do this via `openjd_env: PATH=...`
#     output from onEnter. That works but is fragile.
#   - The wrap approach centralizes it: the inner step env doesn't have to
#     know conda is in play, and there's no double-activation when steps
#     also run conda commands.
#
# Compared to container wrappers:
#   - No docker/apptainer required — just a conda install on the worker
#   - Lighter weight — no image pull, no container lifecycle
#   - Same shape as the container examples — the wrap pattern is identical

specificationVersion: "environment-2023-09"
extensions:
  - WRAP_ACTIONS
  - EXPR

parameterDefinitions:
  - name: CondaEnv
    type: STRING
    default: "base"
    description: "Name of the conda environment to activate."
  - name: CondaChannels
    type: STRING
    default: "conda-forge"
  - name: Packages
    type: STRING
    default: ""
    description: "Space-separated list of packages to install on env creation."

environment:
  name: CondaActivateWrap
  description: >
    Creates (if needed) and activates a conda environment, then routes every
    wrapped inner action through `conda run` so commands find their
    dependencies.
  script:
    let:
      # Preflight: conda env name must not contain shell metacharacters.
      - _env_ok = (
          re_match(Param.CondaEnv, r'^[a-zA-Z0-9_][a-zA-Z0-9_.-]*$') != null
          or fail('CondaEnv contains invalid characters')
        )

      # Package list as an actual list[string] (split on whitespace).
      # Empty param → empty list → no extra install args.
      - package_list = Param.Packages.split() if Param.Packages != '' else []

      # Reusable prefix for every wrap hook: conda run inside our env.
      # --no-capture-output lets stdout/stderr pass through so openjd_env
      # propagation works.
      - conda_run = ['conda', 'run', '-n', Param.CondaEnv, '--no-capture-output']

    actions:
      onEnter:
        command: bash
        args: ["{{Env.File.Enter}}"]

      onWrapEnter:
        command: bash
        args: ["{{Env.File.WrapEnter}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onWrapTaskRun:
        command: bash
        args: ["{{Env.File.WrapTaskRun}}"]
        timeout: "{{Task.Timeout}}"

      onWrapExit:
        command: bash
        args: ["{{Env.File.WrapExit}}"]
        timeout: "{{Env.Wrapped.Timeout}}"

      onExit:
        command: bash
        args: ["-c", "echo 'conda session done'"]

    embeddedFiles:
      - name: Enter
        filename: enter.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          # Create the env idempotently. Every conda command gets safely
          # quoted through repr_sh. package_list flattens inline because
          # it's a list[string] (or empty list → zero extra args).
          if ! conda env list | awk '{print $1}' | grep -qx {{ repr_sh(Param.CondaEnv) }}; then
              conda create -y -n {{ repr_sh(Param.CondaEnv) }} \
                  -c {{ repr_sh(Param.CondaChannels) }} \
                  {{ repr_sh(package_list) }}
          fi

      - name: WrapEnter
        filename: wrap-enter.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail
          echo "[conda-wrap] onEnter for {{ repr_sh(Env.Wrapped.Name) }}"

          # Forward the inner env's env vars via `env KEY=value` prefix.
          # That's simpler than exporting each in the current shell.
          exec env {{ repr_sh(Env.Wrapped.Environment) }} \
              {{ repr_sh(conda_run) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}

      - name: WrapTaskRun
        filename: wrap-task.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          exec env {{ repr_sh(Task.Environment) }} \
              {{ repr_sh(conda_run) }} \
              {{ repr_sh(Task.Command) }} \
              {{ repr_sh(Task.Args) }}

      - name: WrapExit
        filename: wrap-exit.sh
        type: TEXT
        data: |
          #!/usr/bin/env bash
          set -euo pipefail

          exec env {{ repr_sh(Env.Wrapped.Environment) }} \
              {{ repr_sh(conda_run) }} \
              {{ repr_sh(Env.Wrapped.Command) }} \
              {{ repr_sh(Env.Wrapped.Args) }}
